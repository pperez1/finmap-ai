version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env.dev

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: finmap
      POSTGRES_PASSWORD: finmap
      POSTGRES_DB: finmap

      DATABASE_URL=postgresql://finmap:finmap_password@db:5432/finmap